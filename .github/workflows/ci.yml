name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  reader-service-tests:
    name: reader-service tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r apps/reader-service/requirements.txt \
            -r apps/reader-service/requirements-dev.txt

      - name: Run pytest
        working-directory: apps/reader-service
        run: pytest

  backend-tests:
    name: backend tests (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r apps/backend/requirements.txt \
            -r apps/backend/requirements-dev.txt

      - name: Run pytest
        working-directory: apps/backend
        run: pytest

  desktop-tests:
    name: desktop tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r apps/desktop/requirements.txt \
            -r apps/desktop/requirements-dev.txt \
            -r apps/backend/requirements.txt

      - name: Run pytest
        working-directory: apps/desktop
        run: pytest
