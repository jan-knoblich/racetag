services:
  racetag-backend:
    build: ./apps/backend
    image: racetag-backend:latest
    container_name: racetag-backend
    environment:
      - PORT=${RACETAG_PORT:-8600}
      - RACETAG_API_KEY=${RACETAG_API_KEY:-}
      - RACE_TOTAL_LAPS=${RACE_TOTAL_LAPS:-5}
    ports:
      - "${RACETAG_PORT:-8600}:${RACETAG_PORT:-8600}"
    restart: unless-stopped

  racetag-frontend:
    build: ./apps/frontend
    image: racetag-frontend:latest
    container_name: racetag-frontend
    environment:
      - RACETAG_FRONTEND_API_KEY=${RACETAG_FRONTEND_API_KEY:-}
      - RACETAG_FRONTEND_BACKEND_URL=${RACETAG_FRONTEND_BACKEND_URL:-http://localhost:8600}
    ports:
      - "${RACETAG_FRONTEND_PORT:-8680}:80"
    restart: unless-stopped
    depends_on:
      - racetag-backend

  # Reader-service must be on host network to reach the Sirit INfinity 510 on the LAN.
  # It therefore cannot be in the same bridge network as the others, and it talks to the
  # backend via host-port (RACETAG_PORT, default 8600).
  racetag-reader-service:
    build: ./apps/reader-service
    image: racetag-reader-service:latest
    container_name: racetag-reader-service
    restart: unless-stopped
    env_file:
      - ./apps/reader-service/.env
    network_mode: host
    depends_on:
      - racetag-backend
